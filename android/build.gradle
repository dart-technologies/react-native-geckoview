def DEFAULT_COMPILE_SDK_VERSION = 35
def DEFAULT_BUILD_TOOLS_VERSION = '35.0.0'
def DEFAULT_MIN_SDK_VERSION = 24  // React Native 0.81+ requires API 24+
def DEFAULT_TARGET_SDK_VERSION = 35

def isNewArchitectureEnabled() {
    if (rootProject.hasProperty("newArchEnabled")) {
        return rootProject.newArchEnabled == "true"
    }
    return project.hasProperty("newArchEnabled") && project.newArchEnabled == "true"
}
// https://maven.mozilla.org/?prefix=maven2/org/mozilla/geckoview/geckoview/
// Version History (for reference):
// def DEFAULT_GECKOVIEW_VERSION = '72.0.20200107212822'
// def DEFAULT_GECKOVIEW_VERSION = '85.0.20210208133944'
// def DEFAULT_GECKOVIEW_VERSION = '86.0.20210215141125'
// def DEFAULT_GECKOVIEW_VERSION = '106.0.20221025065831'
// def DEFAULT_GECKOVIEW_VERSION = '88.0.20210504152106' // latest that works
// def DEFAULT_GECKOVIEW_VERSION = '101.0.20220608170832'
// def DEFAULT_GECKOVIEW_VERSION = '96.0.20220126154723'
// def DEFAULT_GECKOVIEW_VERSION = '99.0.20220411174855'
// def DEFAULT_GECKOVIEW_VERSION = '97.0.20220304162637' // works (previous stable)
// def DEFAULT_GECKOVIEW_VERSION = '98.0.20220322144853' // fails

// Current version - upgraded 2025-12-02
// See: https://mozilla.github.io/geckoview/javadoc/mozilla-central/org/mozilla/geckoview/doc-files/CHANGELOG
def DEFAULT_GECKOVIEW_VERSION = '143.0.20250908174027' // v143 - major upgrade from v97

def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

buildscript {
    // The Android Gradle plugin is only required when opening the android folder stand-alone.
    // This avoids unnecessary downloads and potential conflicts when the library is included as a
    // module dependency in an application project.
    // ref: https://docs.gradle.org/current/userguide/tutorial_using_tasks.html#sec:build_script_external_dependencies
    if (project == rootProject) {
        repositories {
            google()
            mavenCentral()  // jcenter() is deprecated
        }
        dependencies {
            classpath 'com.android.tools.build:gradle:8.9.1'
            classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:2.2.10'
            classpath 'com.facebook.react:react-native-gradle-plugin'
        }
    }
}

apply plugin: 'com.android.library'
apply plugin: 'maven-publish'
apply plugin: 'kotlin-android'
apply plugin: 'jacoco'  // Test coverage reporting

if (isNewArchitectureEnabled()) {
    apply plugin: 'com.facebook.react'
}

// JaCoCo configuration for test coverage
jacoco {
    toolVersion = "0.8.10"
}

android {
    namespace 'com.reactnative.geckoview'  // Required for Android Gradle Plugin 8.x
    compileSdkVersion safeExtGet('compileSdkVersion', DEFAULT_COMPILE_SDK_VERSION)
    buildToolsVersion safeExtGet('buildToolsVersion', DEFAULT_BUILD_TOOLS_VERSION)
    defaultConfig {
        minSdkVersion safeExtGet('minSdkVersion', DEFAULT_MIN_SDK_VERSION)
        targetSdkVersion safeExtGet('targetSdkVersion', DEFAULT_TARGET_SDK_VERSION)
        versionCode 27
        versionName "1.0"
    }
    lintOptions {
        abortOnError false
    }
    sourceSets {
        main {
            java.srcDirs = [
                'src/main/java',
                'src/main/kotlin'
            ]
            if (isNewArchitectureEnabled()) {
                java.srcDirs += [
                    'src/newarch/kotlin',
                    "$buildDir/generated/source/codegen/java"
                ]
            } else {
                java.srcDirs += [
                    'src/paper/kotlin'
                ]
            }
        }
    }
}



if (isNewArchitectureEnabled()) {
    react {
        libraryName = "reactnativegeckoview"
        root = project.file("../example/")  // Point to where react-native is installed
        jsRootDir = file("../src")
        codegenJavaPackageName = "com.reactnative.geckoview"
    }
    afterEvaluate {
        // Ensure codegen runs before CMake tasks
        // CMake needs the generated sources to exist before configuration
        tasks.matching { task ->
            task.name.startsWith("configureCMake") || task.name.startsWith("buildCMake")
        }.configureEach { task ->
            task.dependsOn("generateCodegenArtifactsFromSchema")
        }
        
        // Ensure codegen runs before Kotlin/Java compilation
        tasks.matching { task ->
            task.name.startsWith("compile") &&
                    (task.name.contains("Kotlin") || task.name.contains("JavaWithJavac"))
        }.configureEach { task ->
            task.dependsOn("generateCodegenArtifactsFromSchema")
        }
    }
}

tasks.withType(Javadoc).all {
    enabled = false
}

repositories {
    // ref: https://www.baeldung.com/maven-local-repository
    mavenLocal()
    maven {
        // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
        url "$rootDir/../node_modules/react-native/android"
    }
    maven {
        // Android JSC is installed from npm
        url "$rootDir/../node_modules/jsc-android/dist"
    }
    maven {
        // Mozilla GeckoView releases
        url "https://maven.mozilla.org/maven2/"
    }
    google()
    mavenCentral()  // jcenter() is deprecated
}

dependencies {
    def geckoviewVersion = safeExtGet('geckoviewVersion', DEFAULT_GECKOVIEW_VERSION)
    //noinspection GradleDynamicVersion
    implementation 'com.facebook.react:react-android:+'  // Modern React Native dependency
    implementation "org.mozilla.geckoview:geckoview:${geckoviewVersion}"
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"

    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito:mockito-core:5.11.0'
    testImplementation 'org.mockito:mockito-inline:5.2.0'
    testImplementation 'org.mockito.kotlin:mockito-kotlin:5.2.1'
    testImplementation 'io.mockk:mockk:1.13.8'  // For mocking Kotlin objects
    testImplementation 'org.robolectric:robolectric:4.11.1'
}

def configureReactNativePom(def pom) {
    def packageJson = new groovy.json.JsonSlurper().parseText(file('../package.json').text)

    pom.project {
        name packageJson.title
        artifactId packageJson.name
        version = packageJson.version
        group = "com.reactnative.geckoview"
        description packageJson.description
        url packageJson.repository.baseUrl

        licenses {
            license {
                name packageJson.license
                url packageJson.repository.baseUrl + '/blob/master/' + packageJson.licenseFilename
                distribution 'repo'
            }
        }

        developers {
            developer {
                id packageJson.author.username
                name packageJson.author.name
            }
        }
    }
}

afterEvaluate { project ->
    // some Gradle build hooks ref:
    // https://www.oreilly.com/library/view/gradle-beyond-the/9781449373801/ch03.html
    task androidJavadoc(type: Javadoc) {
        source = android.sourceSets.main.java.srcDirs
        classpath += files(android.bootClasspath)
        // classpath += files(project.getConfigurations().getByName('compile').asList())
        include '**/*.java'
    }

    task androidJavadocJar(type: Jar, dependsOn: androidJavadoc) {
        archiveClassifier.set('javadoc')
        from androidJavadoc.destinationDir
    }

    task androidSourcesJar(type: Jar) {
        archiveClassifier = 'sources'
        from android.sourceSets.main.java.srcDirs
        include '**/*.java'
    }

    android.libraryVariants.all { variant ->
        def name = variant.name.capitalize()
        def javaCompileTask = variant.javaCompileProvider.get()

        task "jar${name}"(type: Jar, dependsOn: javaCompileTask) {
            from javaCompileTask.destinationDirectory.get().asFile  // destinationDir deprecated
        }
    }

    artifacts {
        archives androidSourcesJar
        archives androidJavadocJar
    }

    // Upload task type deprecated and removed in modern Gradle versions
    // Not needed for standard builds, only for maven publishing
    // task installArchives(type: Upload) {
    //     configuration = configurations.archives
    //     // repositories.mavenDeployer {
    //     //     // Deploy to react-native-event-bridge/maven, ready to publish to npm
    //     //     //     repository url: "file://${projectDir}/../android/maven"
    //     //     //     configureReactNativePom pom
    //     // }
    // }
}

// Test coverage reporting task
tasks.register('jacocoTestReport', JacocoReport) {
    dependsOn 'testDebugUnitTest'
    
    reports {
        xml.required = true
        html.required = true
        csv.required = false
        
        // Output directories
        xml.outputLocation = file("${buildDir}/reports/jacoco/test/jacocoTestReport.xml")
        html.outputLocation = file("${buildDir}/reports/jacoco/test/html")
    }
    
    def fileFilter = [
        '**/R.class',
        '**/R$*.class',
        '**/BuildConfig.*',
        '**/Manifest*.*',
        '**/*Test*.*',
        'android/**/*.*',
        '**/*$ViewInjector*.*',
        '**/*$ViewBinder*.*',
        '**/Lambda$*.class',
        '**/Lambda.class',
        '**/*Lambda.class',
        '**/*Lambda*.class',
        '**/*_MembersInjector.class',
        '**/Dagger*Component*.*',
        '**/*Module_*Factory.class',
        '**/di/module/*',
        '**/*_Factory*.*',
        '**/*Module*.*',
        '**/*Dagger*.*',
        '**/*Hilt*.*'
    ]
    
    def debugTree = fileTree(
        dir: "${buildDir}/tmp/kotlin-classes/debug",
        excludes: fileFilter
    )
    
    sourceDirectories.setFrom(files([
        'src/main/kotlin',
        'src/main/java'
    ]))
    
    classDirectories.setFrom(files([debugTree]))
    executionData.setFrom(fileTree(buildDir) {
        include '**/*.exec'
    })
}

tasks.withType(Test) {
    jacoco {
        includeNoLocationClasses = true
        excludes = ['jdk.internal.*']
    }
}
