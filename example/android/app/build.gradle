apply plugin: "com.android.application"
apply plugin: "kotlin-android"
apply plugin: "com.facebook.react"

react {
    // Root directory where the package.json lives
    root = file("../../")
    entryFile = file("../../index.tsx")

    // Path to React Native
    reactNativeDir = file("../../node_modules/react-native")

    // Path to codegen (for New Architecture)
    codegenDir = file("../../node_modules/@react-native/codegen")

    // Enable autolinking
    autolinkLibrariesWithApp()
}

android {
    namespace "com.reactnative.geckoview.example"
    compileSdkVersion rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.reactnative.geckoview.example"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        testBuildType System.getProperty('testBuildType', 'debug')
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    
    // Hermes is enabled by default in 0.81+
    implementation("com.facebook.react:hermes-android")
    
    // GeckoView library
    implementation project(':react-native-geckoview')

    // Detox E2E Testing
    androidTestImplementation(project(path: ':detox', configuration: 'fullReleaseRuntimeElements'))
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
}
